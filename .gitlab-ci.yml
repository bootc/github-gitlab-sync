---
include:
  - template: Workflows/Branch-Pipelines.gitlab-ci.yml

stages:
  - build
  - git-sync

  - component: $CI_SERVER_FQDN/$CI_PROJECT_NAMESPACE/common-ci-templates/kaniko-multiarch@main
    inputs:
      image_tags: "${CI_COMMIT_SHORT_SHA} latest"
    rules:
      - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "trigger"

git-sync:
  script:
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | ssh-add -
    - git sync-remote
        git@github.com:${CI_PROJECT_PATH}.git
        git@git.boo.tc:${CI_PROJECT_PATH}.git
  stage: git-sync
  image: dkr.boo.tc/bootc/github-gitlab-sync:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger"

